<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Impulso Maya — Escena 3D con GLTF</title>
<style>
  html,body{height:100%;margin:0;background:#071028;color:#eaf9ff;font-family:Inter,system-ui,Roboto,Arial;}
  #webgl-wrap{height:80vh;min-height:520px;display:block;position:relative;overflow:hidden;}
  #three-canvas{width:100%;height:100%;display:block;outline:none;}
  .loader-ui{position:absolute;left:16px;top:16px;color:#cfefff;background:rgba(0,0,0,0.25);padding:8px 12px;border-radius:8px;backdrop-filter:blur(4px);z-index:40;}
  .error-ui{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);color:#fff;background:rgba(0,0,0,0.6);padding:18px;border-radius:10px;z-index:50;display:none;}
</style>
</head>
<body>
<section id="webgl-wrap" aria-label="Escena 3D interactiva">
  <div class="loader-ui" id="loaderUI">Cargando modelo... 0%</div>
  <div class="error-ui" id="errorUI" role="alert"></div>
  <canvas id="three-canvas" tabindex="0" aria-label="Escena 3D interactiva Impulso Maya"></canvas>
</section>

<!--
  Instrucciones:
  - MODEL_URL usa ruta relativa: sube glowing_dragon_3d_model_2_.glb a la raíz
    de este mismo repo de GitHub Pages, junto a este index.html.
  - Si el modelo está comprimido con Draco, deja USE_DRACO en true y verifica dracoDecoderPath.
  - Este script usa módulos ES de three.js cargados desde CDN (unpkg), vía import map.
-->
<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.164.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.164.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { DRACOLoader } from 'three/addons/loaders/DRACOLoader.js';

const MODEL_URL = './glowing_dragon_3d_model_2_.glb'; // Ruta relativa: sube este archivo a la raíz del repo, junto a este index.html
const USE_DRACO = false; // true si tu GLB usa Draco compression
const DRACO_DECODER_PATH = 'https://www.gstatic.com/draco/v1/decoders/'; // CDN Draco

// UI
const loaderUI = document.getElementById('loaderUI');
const errorUI = document.getElementById('errorUI');
const canvas = document.getElementById('three-canvas');

function showError(msg){
  errorUI.style.display = 'block';
  errorUI.textContent = msg;
  loaderUI.style.display = 'none';
}

// Preferencia de movimiento reducido: se lee UNA vez al iniciar.
// IMPORTANTE: no apaga ninguna interacción (scroll, cursor, animaciones del glTF)
// — todas siguen funcionando. Lo único que cambia es la INTENSIDAD del movimiento:
// con reduced motion activado se usa una amplitud/velocidad menor (motionScale)
// y un suavizado (lerp) más lento, evitando saltos bruscos o parallax exagerado,
// que es lo que suele causar molestia (vestibular), sin quitarle funcionalidad a la escena.
const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
const motionScale = prefersReducedMotion ? 0.35 : 1;   // atenúa amplitud de scroll/cursor
const easeSpeed   = prefersReducedMotion ? 0.02 : 0.04; // suavizado más lento = menos brusco
const animSpeed   = prefersReducedMotion ? 0.5 : 1;     // animaciones del glTF a media velocidad

// Brillo pulsante (el glTF no trae "emissive" propio, así que lo agregamos aquí).
// GLOW_COLOR: tono del brillo. GLOW_BASE/GLOW_AMPLITUDE: la intensidad oscila
// entre (GLOW_BASE - GLOW_AMPLITUDE) y (GLOW_BASE + GLOW_AMPLITUDE).
// GLOW_SPEED: velocidad del pulso (radianes/seg). Con reduced motion, la
// amplitud se reduce (motionScale) pero el pulso sigue activo, solo más sutil.
const GLOW_COLOR = 0x66ffe0;
const GLOW_BASE = 0.9;
const GLOW_AMPLITUDE = 0.6 * motionScale;
const GLOW_SPEED = 1.6;

(async function init(){
  if(!window.WebGLRenderingContext){
    showError('Tu navegador no soporta WebGL.');
    return;
  }

  // Renderer
  const renderer = new THREE.WebGLRenderer({canvas, antialias:true, alpha:true});
  renderer.setPixelRatio(Math.min(2, window.devicePixelRatio || 1));
  renderer.outputColorSpace = THREE.SRGBColorSpace; // reemplaza al obsoleto THREE.sRGBEncoding
  renderer.setSize(canvas.clientWidth, canvas.clientHeight, false);

  // Scene + Camera
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x001022);
  const camera = new THREE.PerspectiveCamera(45, canvas.clientWidth/canvas.clientHeight, 0.1, 2000);
  camera.position.set(0, 0, 60);

  // Lights
  const hemi = new THREE.HemisphereLight(0x88cfff, 0x001022, 0.9);
  scene.add(hemi);
  const dir = new THREE.DirectionalLight(0xffffff, 0.6);
  dir.position.set(10,20,10);
  scene.add(dir);

  // GLTF Loader
  const loader = new GLTFLoader();
  if(USE_DRACO){
    const dracoLoader = new DRACOLoader();
    dracoLoader.setDecoderPath(DRACO_DECODER_PATH);
    loader.setDRACOLoader(dracoLoader);
  }

  // Contenedor para el modelo
  const modelRoot = new THREE.Group();
  scene.add(modelRoot);

  let mixer = null;
  let rafId = null;      // id del requestAnimationFrame, para poder cancelarlo
  let disposed = false;  // evita trabajo extra si ya se limpió la escena
  const glowMaterials = []; // materiales del dragón a los que se les anima el brillo

  loader.load(
    MODEL_URL,
    gltf => {
      const root = gltf.scene || gltf.scenes[0];
      root.traverse(node=>{
        if(node.isMesh){
          node.castShadow = true;
          node.receiveShadow = true;
          if(node.material){
            node.material.metalness = node.material.metalness ?? 0.2;
            node.material.roughness = node.material.roughness ?? 0.4;

            // Brillo: el material viene sin emissive propio, así que lo
            // configuramos aquí y lo guardamos para pulsarlo en animate().
            if('emissive' in node.material){
              node.material.emissive = new THREE.Color(GLOW_COLOR);
              node.material.emissiveIntensity = GLOW_BASE;
              glowMaterials.push(node.material);
            }

            node.material.needsUpdate = true;
          }
        }
      });

      // Centrar y escalar el modelo para que quepa en la cámara
      const box = new THREE.Box3().setFromObject(root);
      const size = box.getSize(new THREE.Vector3());
      const maxDim = Math.max(size.x, size.y, size.z);
      const scale = 28 / maxDim; // ajuste heurístico
      root.scale.setScalar(scale);
      box.setFromObject(root);
      const center = box.getCenter(new THREE.Vector3());
      root.position.sub(center);

      modelRoot.add(root);
      loaderUI.textContent = prefersReducedMotion
        ? 'Modelo cargado (movimiento reducido activado)'
        : 'Modelo cargado';

      // Las animaciones del glTF SIEMPRE se activan (no se anulan).
      // Con reduced motion corren a media velocidad (animSpeed) en vez de apagarse.
      if(gltf.animations && gltf.animations.length){
        mixer = new THREE.AnimationMixer(root);
        mixer.timeScale = animSpeed;
        gltf.animations.forEach(a=> mixer.clipAction(a).play());
      }
    },
    xhr => {
      const pct = Math.round((xhr.loaded / (xhr.total || xhr.loaded)) * 100);
      loaderUI.textContent = `Cargando modelo... ${pct}%`;
    },
    err => {
      console.error('Error cargando GLTF:', err);
      showError('No se pudo cargar el modelo. Verifica que MODEL_URL apunte a un .glb/.gltf accesible.');
    }
  );

  // Resize handling
  function onResize(){
    const w = canvas.clientWidth;
    const h = canvas.clientHeight;
    camera.aspect = w/h;
    camera.updateProjectionMatrix();
    renderer.setSize(w,h,false);
  }
  window.addEventListener('resize', onResize);
  onResize();

  // Scroll-driven camera mapping — SIEMPRE activo; con reduced motion
  // la amplitud del desplazamiento se reduce (motionScale) en vez de anularse.
  function updateFromScroll(){
    const total = document.body.scrollHeight - window.innerHeight;
    const sc = (window.scrollY / (total || 1));
    camera.position.z = 60 - sc * 40 * motionScale;
    camera.position.y = -sc * 8 * motionScale;
    modelRoot.rotation.y = sc * Math.PI * 0.8 * motionScale;
    modelRoot.position.z = -sc * 30 * motionScale;
  }
  window.addEventListener('scroll', updateFromScroll);
  updateFromScroll();

  // Cursor interaction (rotación sutil) — SIEMPRE activa; con reduced motion
  // la respuesta al cursor es más discreta (ver motionScale en animate()).
  let cx = 0, cy = 0;
  function onMouseMove(e){
    cx = (e.clientX / window.innerWidth) * 2 - 1;
    cy = (e.clientY / window.innerHeight) * 2 - 1;
  }
  window.addEventListener('mousemove', onMouseMove);

  // Render loop
  const clock = new THREE.Clock();
  let elapsed = 0;
  function animate(){
    if(disposed) return;
    const dt = clock.getDelta();
    elapsed += dt;
    if(mixer) mixer.update(dt);

    // Brillo pulsante: oscila con una onda seno, dando sensación de "movimiento"
    // aunque el modelo no tenga animaciones propias. Con reduced motion la
    // amplitud ya viene atenuada (GLOW_AMPLITUDE incluye motionScale), el
    // pulso sigue activo, solo más sutil.
    const glowPulse = GLOW_BASE + Math.sin(elapsed * GLOW_SPEED) * GLOW_AMPLITUDE;
    for(const mat of glowMaterials){
      mat.emissiveIntensity = glowPulse;
    }

    // idle motion por cursor — SIEMPRE activo; con reduced motion la amplitud
    // (motionScale) y la velocidad de suavizado (easeSpeed) son menores.
    modelRoot.rotation.x += (cy * 0.02 * motionScale - modelRoot.rotation.x) * easeSpeed;
    modelRoot.rotation.y += (cx * 0.02 * motionScale - modelRoot.rotation.y) * easeSpeed;

    camera.lookAt(0,0,0);
    renderer.render(scene, camera);
    rafId = requestAnimationFrame(animate);
  }
  animate();

  // Pausar el loop cuando la pestaña no es visible (ahorra batería/CPU en móviles)
  // y reanudarlo al volver, sin perder el estado de la escena.
  function onVisibilityChange(){
    if(document.hidden){
      if(rafId !== null){ cancelAnimationFrame(rafId); rafId = null; }
      clock.stop();
    } else if(!disposed){
      clock.start();
      animate();
    }
  }
  document.addEventListener('visibilitychange', onVisibilityChange);

  // Limpieza de memoria: libera geometrías, materiales, texturas y el contexto
  // WebGL, y remueve todos los listeners agregados por esta escena. Se ejecuta
  // al salir de la página o si el propio código la invoca (p. ej. en una SPA
  // al desmontar este componente).
  function disposeScene(){
    if(disposed) return;
    disposed = true;

    if(rafId !== null) cancelAnimationFrame(rafId);

    window.removeEventListener('resize', onResize);
    window.removeEventListener('scroll', updateFromScroll);
    window.removeEventListener('mousemove', onMouseMove);
    document.removeEventListener('visibilitychange', onVisibilityChange);
    window.removeEventListener('pagehide', disposeScene);

    modelRoot.traverse(node=>{
      if(node.isMesh){
        node.geometry?.dispose();
        const materials = Array.isArray(node.material) ? node.material : [node.material];
        materials.forEach(mat=>{
          if(!mat) return;
          Object.values(mat).forEach(value=>{
            if(value && value.isTexture) value.dispose();
          });
          mat.dispose();
        });
      }
    });

    mixer?.stopAllAction();
    mixer = null;

    renderer.dispose();
  }

  // 'pagehide' cubre navegación, cierre de pestaña y back/forward cache (más
  // confiable en móviles que 'beforeunload').
  window.addEventListener('pagehide', disposeScene);

  // Expuesto por si se necesita limpiar manualmente (p. ej. al desmontar
  // esta escena dentro de una SPA sin recargar la página).
  window.__impulsoMayaCleanup = disposeScene;
})();
</script>
</body>
</html>
